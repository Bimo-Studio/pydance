[pycodestyle]
# Match Ruff line length; skip legacy noise (same spirit as [tool.ruff.lint] ignore).
max-line-length = 100
exclude = .venv,backup_fixes
ignore = E203,E402,E501,E266,W503

[pylama]
# Aggregates linters; align ignores with Ruff + pycodestyle above. Skip star-import noise (W0401).
skip = .venv/*,backup_fixes/*
linters = pycodestyle,pyflakes
ignore = E203,E402,E501,E266,W503,W0401
